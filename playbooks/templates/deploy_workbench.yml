---
- name: Deploy Class-Sized Lab Environment
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Load the Workbench Mapping
      ansible.builtin.include_vars:
        file: "catalog/mapping.yml"
        name: catalog

    - name: Find requested SKU
      set_fact:
        sku: "{{ catalog.workbenches | selectattr('id', 'equalto', catalog_id) | first }}"

    - name: Set Hardware Profile Base
      set_fact:
        hw_profile: "default-profile"

    - name: Set Hardware Profile GPU Override
      set_fact:
        hw_profile: "nvidia-gpu"
      when: sku.gpu is defined

    - name: Create ServiceAccounts for Students
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: "{{ workbench_name }}-{{ item }}"
            namespace: "student-labs-ns"
      with_sequence: "count={{ student_count | default(1) }}"

    - name: Create Storage (PVC) for Students
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{ workbench_name }}-{{ item }}-storage"
            namespace: "student-labs-ns"
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi 
      with_sequence: "count={{ student_count | default(1) }}"

    - name: Deploy Notebook CRs for Students
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: kubeflow.org/v1
          kind: Notebook
          metadata:
            name: "{{ workbench_name | lower | regex_replace('[^a-z0-9-]', '-') }}-{{ item }}"
            namespace: "student-labs-ns"
            annotations:
              notebooks.opendatahub.io/inject-auth: 'true'
              opendatahub.io/hardware-profile-name: "{{ hw_profile }}"
              opendatahub.io/hardware-profile-namespace: "redhat-ods-applications"
              opendatahub.io/image-display-name: "{{ sku.display_name }}"
              opendatahub.io/username: "{{ professor_handle | default('admin') }}"
              openshift.io/display-name: "{{ workbench_name }}-{{ item }}"
            labels:
              app: "{{ workbench_name | lower | regex_replace('[^a-z0-9-]', '-') }}-{{ item }}"
              opendatahub.io/dashboard: 'true'
              opendatahub.io/odh-managed: 'true'
          spec:
            template:
              spec:
                serviceAccountName: "{{ workbench_name | lower | regex_replace('[^a-z0-9-]', '-') }}-{{ item }}"
                containers:
                  - name: "{{ workbench_name | lower | regex_replace('[^a-z0-9-]', '-') }}-{{ item }}"
                    image: "image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/{{ sku.image }}"
                    workingDir: /opt/app-root/src
                    resources:
                      limits:
                        cpu: "500m"
                        memory: "1Gi"
                        nvidia.com/gpu: "{{ sku.gpu | default(0) }}"
                      requests:
                        cpu: "100m"
                        memory: "512Mi"
                    env:
                      - name: NOTEBOOK_ARGS
                        value: "--ServerApp.port=8888 --ServerApp.token='' --ServerApp.password='' --ServerApp.base_url=/notebook/student-labs-ns/{{ workbench_name }}-{{ item }} --ServerApp.quit_button=False"
                      - name: JUPYTER_IMAGE
                        value: "image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/{{ sku.image }}"
                      - name: NB_PREFIX
                        value: "/notebook/student-labs-ns/{{ workbench_name }}-{{ item }}"
                      - name: GIT_URL
                        value: "{{ git_repo_url | default('') }}"
                      - name: PIP_CERT
                        value: /etc/pki/tls/custom-certs/ca-bundle.crt
                      - name: REQUESTS_CA_BUNDLE
                        value: /etc/pki/tls/custom-certs/ca-bundle.crt
                      - name: SSL_CERT_FILE
                        value: /etc/pki/tls/custom-certs/ca-bundle.crt
                    lifecycle:
                      postStart:
                        exec:
                          command:
                            - "sh"
                            - "-c"
                            - >
                              URL=$(echo "$GIT_URL" | tr -d "'\"");
                              if [ -n "$URL" ]; then
                                cd /opt/app-root/src/ && git clone "$URL";
                              fi
                    ports:
                      - containerPort: 8888
                        name: notebook-port
                    volumeMounts:
                      - name: storage
                        mountPath: /opt/app-root/src/
                      - name: shm
                        mountPath: /dev/shm
                      - name: trusted-ca
                        mountPath: /etc/pki/tls/custom-certs/ca-bundle.crt
                        readOnly: true
                        subPath: ca-bundle.crt
                volumes:
                  - name: storage
                    persistentVolumeClaim:
                      claimName: "{{ workbench_name | lower | regex_replace('[^a-z0-9-]', '-') }}-{{ item }}-storage"
                  - name: shm
                    emptyDir:
                      medium: Memory
                  - name: trusted-ca
                    configMap:
                      name: workbench-trusted-ca-bundle
                      optional: true
      with_sequence: "count={{ student_count | default(1) }}"
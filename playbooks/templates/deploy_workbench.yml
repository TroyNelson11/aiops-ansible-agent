---
- name: Deploy Class-Sized Lab Environment
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Load the Workbench Mapping
      ansible.builtin.include_vars:
        file: "catalog/mapping.yml"
        name: catalog

    - name: Find requested SKU
      set_fact:
        sku: "{{ catalog.workbenches | selectattr('id', 'equalto', catalog_id) | first }}"

    - name: Set Hardware Profile Name
      set_fact:
        # Default first
        hw_profile: "default-profile"
        # Determine GPU need
        is_gpu_lab: "{{ sku.gpu is defined }}"

    - name: Override for GPU
      set_fact:
        hw_profile: "nvidia-gpu"
      when: is_gpu_lab | bool

    - name: Deploy Workbenches for Students
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: kubeflow.org/v1
          kind: Notebook
          metadata:
            name: "{{ workbench_name }}-{{ item }}"
            namespace: "student-labs-ns"
            annotations:
              # THE "SECRET SAUCE" FOR ROUTES:
              notebooks.opendatahub.io/inject-auth: 'true'
              opendatahub.io/hardware-profile-name: "{{ hw_profile }}"
              opendatahub.io/hardware-profile-namespace: "redhat-ods-applications"
              opendatahub.io/dashboard: 'true'
              openshift.io/display-name: "{{ workbench_name }} - Student {{ item }}"
              opendatahub.io/image-display-name: "{{ sku.display_name }}"
              opendatahub.io/username: "{{ professor_handle | default('admin') }}"
            labels:
              app: "{{ workbench_name }}-{{ item }}"
              opendatahub.io/dashboard: 'true'
              opendatahub.io/odh-managed: 'true'
              opendatahub.io/user: "{{ professor_handle | default('admin') | lower | replace(' ', '.') }}"
          spec:
            template:
              spec:
                serviceAccountName: "{{ workbench_name }}-{{ item }}"
                containers:
                  - name: "{{ workbench_name }}"
                    image: "image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/{{ sku.image }}"
                    workingDir: /opt/app-root/src
                    ports:
                      - containerPort: 8888
                        name: notebook-port
                        protocol: TCP
                    env:
                      - name: NOTEBOOK_ARGS
                        value: "--ServerApp.base_url=/notebook/student-labs-ns/{{ workbench_name }}-{{ item }} --ServerApp.token='' --ServerApp.password='' --ServerApp.quit_button=False"
                    resources:
                      limits:
                        cpu: "{{ sku.cpu }}"
                        memory: "{{ sku.memory }}"
                        nvidia.com/gpu: "{{ sku.gpu | default(0) }}"
                  
                  # FIXED INDENTATION BELOW
                  - name: kube-rbac-proxy
                    image: 'registry.redhat.io/rhoai/odh-kube-auth-proxy-rhel9@sha256:4bff9c9b812872be081e64102cbacb711adfacd1862b5593e9809a6822720131'
                    args:
                      - '--secure-listen-address=0.0.0.0:8443'
                      - '--upstream=http://127.0.0.1:8888/'
                      - '--logtostderr=true'
                      - '--v=10'
                      - '--proxy-endpoints-port=8444'
                      - '--tls-cert-file=/etc/tls/private/tls.crt'
                      - '--tls-private-key-file=/etc/tls/private/tls.key'
                      - '--auth-header-fields-enabled=true'
                      - '--auth-header-user-field-name=X-Auth-Request-User'
                      - '--auth-header-groups-field-name=X-Auth-Request-Groups'
                    ports:
                      - containerPort: 8443
                        name: kube-rbac-proxy
                        protocol: TCP
      with_sequence: "count={{ student_count | default(1) }}"
---
- name: Deploy OpenShift AI Workbench
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Load the Workbench Mapping
      ansible.builtin.include_vars:
        file: "catalog/mapping.yml"
        name: catalog

    - name: Find requested SKU from AI
      set_fact:
        sku: "{{ catalog.workbenches | selectattr('id', 'equalto', catalog_id) | first }}"
      failed_when: sku is not defined

    - name: Create Workbench Storage (PVC)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            # RHOAI usually expects the PVC to match the workbench name
            name: "{{ workbench_name }}-storage"
            namespace: "student-labs-ns"
            labels:
              opendatahub.io/dashboard: "true"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi # Standard lab size

    - name: Deploy Notebook CR
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: kubeflow.org/v1
          kind: Notebook
          metadata:
            name: "{{ workbench_name }}"
            namespace: "student-labs-ns"
            labels:
              opendatahub.io/dashboard: "true"
              opendatahub.io/odh-managed: "true"
            annotations:
              opendatahub.io/username: "{{ professor_handle | default('admin') }}"
              openshift.io/display-name: "{{ workbench_name }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ workbench_name }}"
                    image: "image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/{{ sku.image }}"
                    workingDir: /opt/app-root/src
                    resources:
                      limits:
                        cpu: "{{ sku.cpu }}"
                        memory: "{{ sku.memory }}"
                        nvidia.com/gpu: "{{ sku.gpu | default(0) }}"
                      requests:
                        cpu: "{{ sku.cpu }}"
                        memory: "{{ sku.memory }}"
                    volumeMounts:
                      - name: "{{ workbench_name }}-storage"
                        mountPath: /opt/app-root/src
                volumes:
                  - name: "{{ workbench_name }}-storage"
                    persistentVolumeClaim:
                      claimName: "{{ workbench_name }}-storage"
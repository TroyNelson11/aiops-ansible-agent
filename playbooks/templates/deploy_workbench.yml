---
- name: Deploy Abstracted OpenShift AI Workbench
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Load the Workbench Mapping
      ansible.builtin.include_vars:
        file: "catalog/mapping.yml"
        name: catalog

    - name: Find requested SKU from AI
      set_fact:
        # This filter is faster and cleaner than a loop for finding one item
        sku: "{{ catalog.workbenches | selectattr('id', 'equalto', catalog_id) | first }}"
      failed_when: sku is not defined

    - name: Ensure Student Namespace Exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "student-labs-ns"
            labels:
              # This label helps RHOAI recognize the namespace
              opendatahub.io/dashboard: "true"

    - name: Deploy Notebook CR
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: kubeflow.org/v1
          kind: Notebook
          metadata:
            name: "{{ workbench_name | default('student-lab') }}"
            namespace: "student-labs-ns"
            labels:
              opendatahub.io/dashboard: "true"
            annotations:
              aiops.assistant/professor: "{{ professor_handle | default('Unknown') }}"
              aiops.assistant/department: "{{ department | default('General') }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ workbench_name | default('student-lab') }}"
                    # Using the internal registry path you provided
                    image: "image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/{{ sku.image }}"
                    workingDir: /opt/app-root/src
                    resources:
                      limits:
                        cpu: "{{ sku.cpu }}"
                        memory: "{{ sku.memory }}"
                        nvidia.com/gpu: "{{ sku.gpu | default(0) }}"
                      requests:
                        cpu: "{{ sku.cpu }}"
                        memory: "{{ sku.memory }}"